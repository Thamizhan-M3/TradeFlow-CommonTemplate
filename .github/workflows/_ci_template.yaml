name: Common_CI

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
      run_build:
        required: false
        type: boolean
        default: false
      sonar_project_key:
        required: false
        type: string
        default: 'tradeflow'
      docker_context:
        required: false
        type: string
        default: '.'
      dockerfile_path:
        required: false
        type: string
        default: ''
      service_name:
        required: true
        type: string

    secrets:
      SONAR_TOKEN: { required: true }
      SONAR_HOST_URL: { required: true }
      SNYK_TOKEN: { required: true }
      DOCKERHUB_USERNAME: { required: true }
      DOCKERHUB_TOKEN: { required: true }

# ─────────────────────────────────────────────
# JOB 1: PREPARE (TAG GENERATION)
# ─────────────────────────────────────────────
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      push: ${{ steps.meta.outputs.push }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Semantic Version (master only)
        id: semver
        if: github.ref == 'refs/heads/master'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          dry_run: true
          default_bump: patch
          tag_prefix: 'v'

      - name: Resolve Tag
        id: meta
        run: |
          BRANCH="${{ github.ref_name }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [[ "$BRANCH" == "master" ]]; then
            TAG="${{ steps.semver.outputs.new_tag }}"
            if [ -z "$TAG" ]; then
              TAG="v0.0.0-${SHORT_SHA}"
            fi
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "qa" ]]; then
            echo "tag=qa-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "dev" ]]; then
            echo "tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "push=false" >> $GITHUB_OUTPUT

          else
            echo "tag=feature-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "push=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate Tag
        run: |
          if [ -z "${{ steps.meta.outputs.tag }}" ]; then
            echo "❌ TAG EMPTY"
            exit 1
          else
            echo "✅ TAG = ${{ steps.meta.outputs.tag }}"
          fi

# ─────────────────────────────────────────────
# JOB 2: TEST
# ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: prepare

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci || npm install
      - run: npm test || echo "No tests"

# ─────────────────────────────────────────────
# JOB 3: SONAR (non-blocking)
# ─────────────────────────────────────────────
  sonar:
    if: |
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/qa' ||
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: prepare
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

# ─────────────────────────────────────────────
# JOB 4: SNYK (non-blocking)
# ─────────────────────────────────────────────
  snyk:
    if: |
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/qa' ||
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: prepare
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci || npm install

      # ✅ More stable than snyk action
      - name: Install Snyk
        run: npm install -g snyk

      - name: Auth Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Scan
        run: snyk test --severity-threshold=high

# ─────────────────────────────────────────────
# JOB 5: BUILD (CORE PIPELINE)
# ─────────────────────────────────────────────
  build:
    if: |
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/qa' ||
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [prepare, test]

    steps:
      - uses: actions/checkout@v4

      - name: Debug Tag
        run: echo "BUILD TAG = ${{ needs.prepare.outputs.tag }}"

      - name: Build App (optional)
        if: inputs.run_build == true
        run: |
          cd ${{ inputs.working_directory }}
          npm ci || npm install
          npm run build

      - name: Resolve Dockerfile
        id: df
        run: |
          if [ -z "${{ inputs.dockerfile_path }}" ]; then
            echo "path=Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "path=${{ inputs.dockerfile_path }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Image
        run: |
          docker build \
            -f ${{ steps.df.outputs.path }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ needs.prepare.outputs.tag }} \
            ${{ inputs.docker_context }}

      - name: Save Image
        run: |
          docker save \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ needs.prepare.outputs.tag }} \
            -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ inputs.service_name }}
          path: image.tar

# ─────────────────────────────────────────────
# JOB 6: TRIVY
# ─────────────────────────────────────────────
  trivy:
    if: |
      github.ref == 'refs/heads/qa' ||
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ inputs.service_name }}

      - run: docker load -i image.tar

      - name: Debug Tag
        run: echo "TRIVY TAG = ${{ needs.prepare.outputs.tag }}"

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ needs.prepare.outputs.tag || github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1

# ─────────────────────────────────────────────
# JOB 7: PUSH
# ─────────────────────────────────────────────
  push:
    if: needs.prepare.outputs.push == 'true'
    runs-on: ubuntu-latest
    needs: [prepare, trivy]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ inputs.service_name }}

      - run: docker load -i image.tar

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ needs.prepare.outputs.tag }}

          if [[ "${{ github.ref_name }}" == "master" ]]; then
            docker tag \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ needs.prepare.outputs.tag }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest
          fi

# ─────────────────────────────────────────────
# JOB 8: RELEASE
# ─────────────────────────────────────────────
  release:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [prepare, push]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug Tag
        run: echo "RELEASE TAG = ${{ needs.prepare.outputs.tag }}"

      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          custom_tag: ${{ needs.prepare.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true